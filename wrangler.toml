name = "aurestream-api-worker"
main = "dist/index.js"
compatibility_date = "2025-06-09"
no_bundle = true

[build]
command = "node scripts/build.js"

[[d1_databases]]
binding = "DB"
database_name = "aurestream-db"
database_id = "e6cdae14-71ec-494c-9430-1997887eb2f4"

[vars]
JWT_SECRET = "aurestream-dev-secret-change-me"

[env.production]
vars = { JWT_SECRET = "change-me-in-production" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "aurestream-db"
database_id = "e6cdae14-71ec-494c-9430-1997887eb2f4"
